{% extends 'admin/admin_base.html' %}

{% block admin_page_title %}Edit News{% endblock %}
{% block admin_page_subtitle %}Update Maskandi news details{% endblock %}

{% block admin_content %}
<div class="admin-panel">
    <form action="{{ url_for('edit_news', news_id=news_item['id']) }}" method="POST" enctype="multipart/form-data">
        <div style="display:grid; grid-template-columns: repeat(2, 1fr); gap:16px; margin-bottom:16px;">
            <input type="text" name="title" value="{{ news_item['title'] }}" class="admin-search" required>
            <input type="text" name="category" value="{{ news_item['category'] }}" class="admin-search" required>
        </div>

        <div style="display:grid; grid-template-columns: repeat(2, 1fr); gap:16px; margin-bottom:16px;">
            <select name="status" class="admin-search" required>
                <option value="Draft" {% if news_item['status'] == 'Draft' %}selected{% endif %}>Draft</option>
                <option value="Published" {% if news_item['status'] == 'Published' %}selected{% endif %}>Published</option>
            </select>
            <input type="file" name="image" class="admin-search" accept=".png,.jpg,.jpeg,.webp">
        </div>

        <div style="margin-bottom:16px;">
            <textarea name="content" rows="8" class="admin-search" style="width:100%; resize:vertical;" required>{{ news_item['content'] }}</textarea>
        </div>

        <button type="submit" class="primary-admin-btn">Save Changes</button>
        <a href="{{ url_for('manage_news') }}" class="table-btn" style="text-decoration:none;">Cancel</a>
    </form>
</div>
{% endblock %}
