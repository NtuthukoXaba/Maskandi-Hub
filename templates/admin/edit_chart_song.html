{% extends 'admin/admin_base.html' %}

{% block admin_page_title %}Edit Chart Song{% endblock %}
{% block admin_page_subtitle %}Update chart song details and rank{% endblock %}

{% block admin_content %}
<div class="admin-panel artist-form-panel">
    <h3>Edit Chart Song</h3>

    <form method="POST" class="artist-admin-form" enctype="multipart/form-data">
        <div class="form-grid-2">
            <input type="text" name="artist_name" value="{{ song['artist_name'] }}" placeholder="Artist Name" required>
            <input type="text" name="song_title" value="{{ song['song_title'] }}" placeholder="Song Name" required>

            <input type="number" name="rank_number" value="{{ song['rank_number'] }}" placeholder="Rank Number" min="1" required>

            <select name="status" required>
                <option value="Published" {% if song['status'] == 'Published' %}selected{% endif %}>Published</option>
                <option value="Draft" {% if song['status'] == 'Draft' %}selected{% endif %}>Draft</option>
            </select>

            <input type="file" name="image" accept=".png,.jpg,.jpeg,.webp">
        </div>

        {% if song['image'] %}
        <div style="margin: 18px 0 10px;">
            <p style="margin-bottom: 10px; color: #fff;">Current Song Image</p>
            <img src="{{ url_for('static', filename='uploads/songs/' ~ song['image']) }}"
                 alt="{{ song['song_title'] }}"
                 class="artist-thumb"
                 style="width: 90px; height: 90px; border-radius: 16px;">
        </div>
        {% endif %}

        <div class="modal-action-row">
            <a href="{{ url_for('manage_songs') }}" class="secondary-admin-btn">Back</a>
            <button type="submit" class="primary-admin-btn">Update Song</button>
        </div>
    </form>
</div>
{% endblock %}
