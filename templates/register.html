{% block content %}
<section class="form-section">
    <h1>Register</h1>

        <input type="text" placeholder="Full Name">
        <input type="email" placeholder="Email">
        <input type="password" placeholder="Password">
        <button type="submit" class="btn">Create Account</button>
    </form>
</section>
{% endblock %}
